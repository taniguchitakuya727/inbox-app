<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Inbox</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #333;
    }
    
    body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    label {
      font-size: 13px;
      color: #666;
      font-weight: 500;
    }
    
    input[type="text"],
    textarea {
      font-family: inherit;
      font-size: 16px;
      padding: 12px;
      border: 0.5px solid #ddd;
      border-radius: 6px;
      background: #fff;
      color: #333;
    }
    
    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1);
    }
    
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    button {
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 500;
      border: 0.5px solid #0066cc;
      background: #0066cc;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:active {
      opacity: 0.8;
      transform: scale(0.98);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      background: #333;
      color: white;
      border-radius: 6px;
      font-size: 14px;
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }
    
    .toast.success {
      background: #22c55e;
    }
    
    .toast.error {
      background: #ef4444;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
    
    .date-display {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Inbox</h1>
  
  <div class="form-group">
    <label>日付</label>
    <div class="date-display" id="dateDisplay"></div>
  </div>
  
  <div class="form-group">
    <label for="topic">トピック</label>
    <input 
      type="text" 
      id="topic" 
      placeholder="例：京都音楽博覧会" 
      maxlength="100"
    >
  </div>
  
  <div class="form-group">
    <label for="content">内容</label>
    <textarea 
      id="content" 
      placeholder="気になったことを自由に書く"
    ></textarea>
  </div>
  
  <button id="saveBtn">保存</button>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx_DkMwA2ubHzqfV8nhrPPGnnTSAWR5YQRkX5GeERk2ixMt8cdnAvHQTofTd-sy2Zas9g/exec";
    
    const dateDisplay = document.getElementById('dateDisplay');
    const topicInput = document.getElementById('topic');
    const contentInput = document.getElementById('content');
    const saveBtn = document.getElementById('saveBtn');
    
    // 日付を表示（JST）
    function updateDateDisplay() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      dateDisplay.textContent = `${year}-${month}-${day}`;
    }
    
    // 初期化
    updateDateDisplay();
    
    // localStorage から前回のデータを復元
    function loadFromStorage() {
      const saved = localStorage.getItem('inboxDraft');
      if (saved) {
        const draft = JSON.parse(saved);
        topicInput.value = draft.topic || '';
        contentInput.value = draft.content || '';
      }
    }
    
    // localStorage に保存（オートセーブ）
    function saveToStorage() {
      const draft = {
        topic: topicInput.value,
        content: contentInput.value,
        timestamp: new Date().toISOString()
      };
      localStorage.setItem('inboxDraft', JSON.stringify(draft));
    }
    
    // トースト表示
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 2000);
    }
    
    // 保存処理
    async function handleSave() {
      const topic = topicInput.value.trim();
      const content = contentInput.value.trim();
      
      if (!topic || !content) {
        showToast('トピックと内容を入力してください', 'error');
        return;
      }
      
      saveBtn.disabled = true;
      
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({
            topic: topic,
            content: content
          })
        });
        
        const result = await response.json();
        
        if (result.status === 'success') {
          showToast('保存されました');
          topicInput.value = '';
          contentInput.value = '';
          localStorage.removeItem('inboxDraft');
        } else {
          showToast('保存に失敗しました', 'error');
        }
      } catch (error) {
        showToast('通信エラーが発生しました', 'error');
        console.error(error);
      } finally {
        saveBtn.disabled = false;
      }
    }
    
    // イベントリスナー
    saveBtn.addEventListener('click', handleSave);
    
    topicInput.addEventListener('change', saveToStorage);
    contentInput.addEventListener('change', saveToStorage);
    
    // ページロード時に復元
    loadFromStorage();
    
    // PWA マニフェスト登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {
        // SW 登録失敗時は無視
      });
    }
  </script>
</body>
</html>
