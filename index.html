<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Inbox</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #333;
    }
    
    body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    label {
      font-size: 13px;
      color: #666;
      font-weight: 500;
    }
    
    input[type="text"],
    textarea {
      font-family: inherit;
      font-size: 16px;
      padding: 12px;
      border: 0.5px solid #ddd;
      border-radius: 6px;
      background: #fff;
      color: #333;
    }
    
    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1);
    }
    
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    button {
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 500;
      border: 0.5px solid #0066cc;
      background: #0066cc;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:active {
      opacity: 0.8;
      transform: scale(0.98);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      background: #333;
      color: white;
      border-radius: 6px;
      font-size: 14px;
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }
    
    .toast.success {
      background: #22c55e;
    }
    
    .toast.error {
      background: #ef4444;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
    
    .date-display {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Inbox</h1>
  
  <div class="form-group">
    <label>日付</label>
    <div class="date-display" id="dateDisplay"></div>
  </div>
  
  <div class="form-group">
    <label for="topic">トピック</label>
    <input 
      type="text" 
      id="topic" 
      placeholder="例：京都音楽博覧会" 
      maxlength="100"
    >
  </div>
  
  <div class="form-group">
    <label for="content">内容</label>
    <textarea 
      id="content" 
      placeholder="気になったことを自由に書く"
    ></textarea>
  </div>
  
  <button id="saveBtn">保存</button>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx_DkMwA2ubHzqfV8nhrPPGnnTSAWR5YQRkX5GeERk2ixMt8cdnAvHQTofTd-sy2Zas9g/exec";
    const QUEUE_KEY = 'inboxQueue';
    
    const dateDisplay = document.getElementById('dateDisplay');
    const topicInput = document.getElementById('topic');
    const contentInput = document.getElementById('content');
    const saveBtn = document.getElementById('saveBtn');
    
    let isSending = false;
    
    function updateDateDisplay() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      dateDisplay.textContent = `${year}-${month}-${day}`;
    }
    
    updateDateDisplay();
    
    function getQueue() {
      try {
        return JSON.parse(localStorage.getItem(QUEUE_KEY)) || [];
      } catch {
        return [];
      }
    }
    
    function setQueue(queue) {
      localStorage.setItem(QUEUE_KEY, JSON.stringify(queue));
    }
    
    function addToQueue(item) {
      const queue = getQueue();
      queue.push(item);
      setQueue(queue);
    }
    
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }
    
    // 未送信キューを裏で順番に送信（待たない、失敗しても残す）
    async function flushQueue() {
      if (isSending) return;
      isSending = true;
      
      let queue = getQueue();
      
      while (queue.length > 0) {
        const item = queue[0];
        try {
          const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(item)
          });
          const result = await response.json();
          
          if (result.status === 'success') {
            queue.shift();
            setQueue(queue);
          } else {
            break;
          }
        } catch (error) {
          console.error('送信エラー、後で再試行:', error);
          break;
        }
      }
      
      isSending = false;
    }
    
    // 保存処理（即座にクリア、裏で送信）
    function handleSave() {
      const topic = topicInput.value.trim();
      const content = contentInput.value.trim();
      
      if (!topic || !content) {
        showToast('トピックと内容を入力してください', 'error');
        return;
      }
      
      addToQueue({ topic, content });
      topicInput.value = '';
      contentInput.value = '';
      topicInput.focus();
      showToast('保存されました');
      
      flushQueue();
    }
    
    saveBtn.addEventListener('click', handleSave);
    
    // 起動時に未送信分があれば裏で送信を試みる
    flushQueue();
    
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
