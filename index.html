<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Inbox</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #333;
    }
    
    body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    /* タブ */
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid #eee;
      margin-bottom: 4px;
    }
    
    .tab-btn {
      flex: 1;
      padding: 10px 8px;
      font-size: 14px;
      font-weight: 500;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #999;
      cursor: pointer;
      border-radius: 0;
    }
    
    .tab-btn.active {
      color: #0066cc;
      border-bottom-color: #0066cc;
    }
    
    .tab-panel { display: none; flex-direction: column; gap: 12px; }
    .tab-panel.active { display: flex; }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    label {
      font-size: 13px;
      color: #666;
      font-weight: 500;
    }
    
    input[type="text"],
    textarea {
      font-family: inherit;
      font-size: 16px;
      padding: 12px;
      border: 0.5px solid #ddd;
      border-radius: 6px;
      background: #fff;
      color: #333;
    }
    
    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1);
    }
    
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    #jikakuContent {
      min-height: 220px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      white-space: pre-wrap;
    }
    
    button {
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 500;
      border: 0.5px solid #0066cc;
      background: #0066cc;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:active {
      opacity: 0.8;
      transform: scale(0.98);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      background: #333;
      color: white;
      border-radius: 6px;
      font-size: 14px;
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }
    
    .toast.success {
      background: #22c55e;
    }
    
    .toast.error {
      background: #ef4444;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
    
    .date-display {
      font-size: 14px;
      color: #666;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #333;
      cursor: pointer;
      padding: 4px 0;
    }

    .toggle-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }

    .mini-settings {
      font-size: 12px;
      color: #999;
    }

    .mini-settings summary {
      cursor: pointer;
      padding: 4px 0;
    }

    .calendar-toggle-btn {
      background: none;
      border: 0.5px solid #ddd;
      color: #666;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 12px;
      width: auto;
      align-self: flex-start;
    }
    .calendar-toggle-btn:active {
      opacity: 0.7;
      transform: none;
    }

    .calendar-box {
      display: none;
      border: 0.5px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      background: #fafafa;
    }
    .calendar-box.open {
      display: block;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .calendar-header button {
      background: none;
      border: 0.5px solid #ddd;
      color: #333;
      width: 32px;
      height: 32px;
      padding: 0;
      font-size: 16px;
      border-radius: 6px;
    }
    .calendar-month-label {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .calendar-dow {
      font-size: 10px;
      color: #999;
      text-align: center;
      padding: 2px 0;
    }
    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #333;
      border-radius: 6px;
      position: relative;
    }
    .calendar-day.empty {
      visibility: hidden;
    }
    .calendar-day.today {
      border: 1.5px solid #0066cc;
      font-weight: 600;
    }
    .calendar-day.uploaded {
      background: #22c55e;
      color: #fff;
      font-weight: 600;
    }
    .calendar-loading {
      font-size: 12px;
      color: #999;
      text-align: center;
      padding: 8px 0;
    }

  </style>
</head>
<body>
  <h1>Inbox</h1>

  <div class="tabs">
    <button class="tab-btn active" data-tab="inbox">Inbox</button>
    <button class="tab-btn" data-tab="jikaku">自覚ログ</button>
  </div>

  <!-- Inbox タブ -->
  <div class="tab-panel active" id="tab-inbox">
    <div class="form-group">
      <label>日付</label>
      <div class="date-display" id="dateDisplay"></div>
    </div>
    
    <div class="form-group">
      <label for="topic">トピック</label>
      <input 
        type="text" 
        id="topic" 
        placeholder="例：京都音楽博覧会" 
        maxlength="100"
      >
    </div>
    
    <div class="form-group">
      <label for="content">内容</label>
      <textarea 
        id="content" 
        placeholder="気になったことを自由に書く"
      ></textarea>
    </div>

    <label class="toggle-row">
      <input type="checkbox" id="crosspostBujoToggle">
      <span>Bujoのタスクにもする</span>
    </label>
    
    <button id="saveBtn">保存</button>

    <details class="mini-settings">
      <summary>連携設定</summary>
      <div class="form-group" style="margin-top:8px;">
        <label for="bujoGasUrlInput">Bujo GAS URL</label>
        <input 
          type="text" 
          id="bujoGasUrlInput" 
          placeholder="https://script.google.com/macros/s/.../exec"
        >
      </div>
    </details>
  </div>

  <!-- 自覚ログ タブ -->
  <div class="tab-panel" id="tab-jikaku">
    <div class="form-group">
      <label>日付</label>
      <div class="date-display" id="dateDisplayJikaku"></div>
    </div>

    <button type="button" class="calendar-toggle-btn" id="calendarToggleBtn">📅 カレンダーを表示</button>

    <div class="calendar-box" id="calendarBox">
      <div class="calendar-header">
        <button type="button" id="calPrevBtn">‹</button>
        <div class="calendar-month-label" id="calMonthLabel"></div>
        <button type="button" id="calNextBtn">›</button>
      </div>
      <div id="calLoading" class="calendar-loading">読み込み中...</div>
      <div class="calendar-grid" id="calGrid" style="display:none;"></div>
    </div>

    <div class="form-group">
      <label for="jikakuContent">壁打ち結果を貼り付け</label>
      <textarea 
        id="jikakuContent" 
        placeholder="ChatGPTで出力した「自覚ログ｜YYYY-MM-DD」形式のテキストをそのまま貼り付け"
      ></textarea>
    </div>

    <button id="saveJikakuBtn">保存</button>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx_DkMwA2ubHzqfV8nhrPPGnnTSAWR5YQRkX5GeERk2ixMt8cdnAvHQTofTd-sy2Zas9g/exec";
    const QUEUE_KEY = 'inboxQueue';
    const BUJO_URL_KEY = 'bujoGasUrl';
    const CROSSPOST_KEY = 'crosspostBujoEnabled';
    
    const dateDisplay = document.getElementById('dateDisplay');
    const dateDisplayJikaku = document.getElementById('dateDisplayJikaku');
    const topicInput = document.getElementById('topic');
    const contentInput = document.getElementById('content');
    const saveBtn = document.getElementById('saveBtn');
    const jikakuContent = document.getElementById('jikakuContent');
    const saveJikakuBtn = document.getElementById('saveJikakuBtn');
    const crosspostBujoToggle = document.getElementById('crosspostBujoToggle');
    const bujoGasUrlInput = document.getElementById('bujoGasUrlInput');
    
    let isSending = false;
    
    // ─── Bujo連携設定の読み込み・保存（前回の状態を覚えておく） ───
    bujoGasUrlInput.value = localStorage.getItem(BUJO_URL_KEY) || '';
    crosspostBujoToggle.checked = localStorage.getItem(CROSSPOST_KEY) === 'true';
    
    bujoGasUrlInput.addEventListener('change', () => {
      localStorage.setItem(BUJO_URL_KEY, bujoGasUrlInput.value.trim());
    });
    crosspostBujoToggle.addEventListener('change', () => {
      localStorage.setItem(CROSSPOST_KEY, crosspostBujoToggle.checked ? 'true' : 'false');
    });
    
    function todayStr() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }
    
    function updateDateDisplay() {
      const d = todayStr();
      dateDisplay.textContent = d;
      dateDisplayJikaku.textContent = d;
    }
    
    updateDateDisplay();
    
    // ─── タブ切り替え ───
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });
    
    // ─── キュー共通処理 ───
    function getQueue() {
      try {
        return JSON.parse(localStorage.getItem(QUEUE_KEY)) || [];
      } catch {
        return [];
      }
    }
    
    function setQueue(queue) {
      localStorage.setItem(QUEUE_KEY, JSON.stringify(queue));
    }
    
    function addToQueue(item) {
      const queue = getQueue();
      queue.push(item);
      setQueue(queue);
    }
    
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }
    
    // 保存ボタン自体のテキストを一瞬変える（キーボード表示中でも指の近くで見える）
    let saveBtnTimer = null;
    function flashSaveButton(text = '✓ 保存しました') {
      const original = '保存';
      saveBtn.textContent = text;
      clearTimeout(saveBtnTimer);
      saveBtnTimer = setTimeout(() => {
        saveBtn.textContent = original;
      }, 800);
    }
    
    // Bujo用：GETリクエスト＋base64ペイロード方式（Bujo GASの仕様に合わせる）
    async function sendToBujo(bujoUrl, payloadObj) {
      const payload = btoa(unescape(encodeURIComponent(JSON.stringify(payloadObj))));
      const url = bujoUrl + '?payload=' + encodeURIComponent(payload);
      const response = await fetch(url);
      const result = await response.json();
      if (result.error) throw new Error(result.error);
      return result;
    }
    
    // 未送信キューを裏で順番に送信（待たない、失敗しても残す）
    // item.kind: 'inbox'（自分のGASにPOST） / 'bujo'（BujoのGASにGET+base64）
    async function flushQueue() {
      if (isSending) return;
      isSending = true;
      
      let queue = getQueue();
      
      while (queue.length > 0) {
        const item = queue[0];
        try {
          if (item.kind === 'bujo') {
            await sendToBujo(item.bujoUrl, item.payload);
          } else {
            const response = await fetch(GAS_URL, {
              method: 'POST',
              body: JSON.stringify(item)
            });
            const result = await response.json();
            if (result.status !== 'success') throw new Error(result.message || 'failed');
          }
          queue.shift();
          setQueue(queue);
        } catch (error) {
          console.error('送信エラー、後で再試行:', error);
          break;
        }
      }
      
      isSending = false;
    }
    
    // ─── Inbox 保存 ───
    function handleSave() {
      const topic = topicInput.value.trim() || 'メモ';
      const content = contentInput.value.trim();
      
      if (!content) {
        showToast('内容を入力してください', 'error');
        return;
      }
      
      addToQueue({ kind: 'inbox', type: 'inbox', topic, content });
      
      // トグルONかつBujo URL設定済みなら、Bujoにもタスクとして転記
      const bujoUrl = localStorage.getItem(BUJO_URL_KEY);
      if (crosspostBujoToggle.checked && bujoUrl) {
        const bujoText = (topic && topic !== 'メモ') ? `${topic}: ${content}` : content;
        addToQueue({
          kind: 'bujo',
          bujoUrl: bujoUrl,
          payload: {
            action: 'saveEntry',
            id: 'ib_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6),
            date: todayStr(),
            sym: '・',
            text: bujoText,
            state: 'open'
          }
        });
      }
      
      topicInput.value = '';
      contentInput.value = '';
      topicInput.focus();
      const savedMsg = crosspostBujoToggle.checked && bujoUrl ? '保存されました（Bujoにも転記）' : '保存されました';
      showToast(savedMsg);
      flashSaveButton(crosspostBujoToggle.checked && bujoUrl ? '✓ 保存(Bujoにも)' : '✓ 保存しました');
      
      flushQueue();
    }
    
    // ─── 自覚ログ フォーマット自動統一 ───
    // どんな#の数で貼り付けられても、統一フォーマットに正規化する
    // タイトル行（自覚ログ｜日付）→ "### 自覚ログ｜..."
    // 4項目見出し（起きていた現象など）→ "#### 見出し"
    function normalizeJikaku(text) {
      const categoryNames = ['起きていた現象', '見えていた向き', '言葉の作用', '今日の一文'];
      const lines = text.split('\n');
      
      const normalized = lines.map(line => {
        const trimmed = line.trim();
        
        // タイトル行の検出（先頭の#や空白を無視して「自覚ログ｜」を含むか）
        const titleMatch = trimmed.match(/^#*\s*(自覚ログ｜.+)$/);
        if (titleMatch) {
          return '### ' + titleMatch[1];
        }
        
        // 4項目見出しの検出
        for (const name of categoryNames) {
          const headingMatch = trimmed.match(new RegExp('^#*\\s*' + name + '\\s*$'));
          if (headingMatch) {
            return '#### ' + name;
          }
        }
        
        // それ以外の行はそのまま
        return line;
      });
      
      return normalized.join('\n');
    }
    
    // ─── 自覚ログ 保存 ───
    function handleSaveJikaku() {
      const raw = jikakuContent.value.trim();
      
      if (!raw) {
        showToast('内容を貼り付けてください', 'error');
        return;
      }
      
      const content = normalizeJikaku(raw);
      
      addToQueue({ type: 'jikaku', date: todayStr(), content });
      jikakuContent.value = '';
      showToast('保存されました（フォーマット統一済み）');
      
      flushQueue().then(() => {
        // 送信完了後、カレンダーが開いていれば最新状態に更新
        if (typeof refreshCalendarIfOpen === 'function') refreshCalendarIfOpen();
      });
    }
    
    // ─── 自覚ログ カレンダー ───
    const CAL_OPEN_KEY = 'jikakuCalendarOpen';
    const calendarToggleBtn = document.getElementById('calendarToggleBtn');
    const calendarBox = document.getElementById('calendarBox');
    const calPrevBtn = document.getElementById('calPrevBtn');
    const calNextBtn = document.getElementById('calNextBtn');
    const calMonthLabel = document.getElementById('calMonthLabel');
    const calLoading = document.getElementById('calLoading');
    const calGrid = document.getElementById('calGrid');

    let uploadedDatesCache = null; // Set<'YYYY-MM-DD'>
    let calViewYear, calViewMonth; // calViewMonth: 0-11

    function initCalendarView() {
      const now = new Date();
      calViewYear = now.getFullYear();
      calViewMonth = now.getMonth();
    }
    initCalendarView();

    function setCalendarOpen(open) {
      calendarBox.classList.toggle('open', open);
      calendarToggleBtn.textContent = open ? '📅 カレンダーを隠す' : '📅 カレンダーを表示';
      localStorage.setItem(CAL_OPEN_KEY, open ? 'true' : 'false');
      if (open && !uploadedDatesCache) {
        loadUploadedDates();
      } else if (open) {
        renderCalendar();
      }
    }

    calendarToggleBtn.addEventListener('click', () => {
      const isOpen = calendarBox.classList.contains('open');
      setCalendarOpen(!isOpen);
    });

    calPrevBtn.addEventListener('click', () => {
      calViewMonth--;
      if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
      renderCalendar();
    });
    calNextBtn.addEventListener('click', () => {
      calViewMonth++;
      if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
      renderCalendar();
    });

    async function loadUploadedDates() {
      calLoading.style.display = 'block';
      calGrid.style.display = 'none';
      try {
        const response = await fetch(GAS_URL + '?type=jikaku_dates');
        const result = await response.json();
        uploadedDatesCache = new Set(result.dates || []);
      } catch (error) {
        console.error('カレンダーデータ取得失敗:', error);
        uploadedDatesCache = new Set();
      }
      calLoading.style.display = 'none';
      calGrid.style.display = 'grid';
      renderCalendar();
    }

    function renderCalendar() {
      if (!uploadedDatesCache) return;

      calMonthLabel.textContent = `${calViewYear}年${calViewMonth + 1}月`;
      calGrid.innerHTML = '';

      ['日','月','火','水','木','金','土'].forEach(d => {
        const el = document.createElement('div');
        el.className = 'calendar-dow';
        el.textContent = d;
        calGrid.appendChild(el);
      });

      const firstDow = new Date(calViewYear, calViewMonth, 1).getDay();
      const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
      const todayStrVal = todayStr();

      for (let i = 0; i < firstDow; i++) {
        const el = document.createElement('div');
        el.className = 'calendar-day empty';
        calGrid.appendChild(el);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const m = String(calViewMonth + 1).padStart(2, '0');
        const d = String(day).padStart(2, '0');
        const dateStr = `${calViewYear}-${m}-${d}`;

        const el = document.createElement('div');
        el.className = 'calendar-day';
        if (dateStr === todayStrVal) el.classList.add('today');
        if (uploadedDatesCache.has(dateStr)) el.classList.add('uploaded');
        el.textContent = day;
        calGrid.appendChild(el);
      }
    }

    // 前回の開閉状態を復元
    if (localStorage.getItem(CAL_OPEN_KEY) === 'true') {
      setCalendarOpen(true);
    }

    // 自覚ログ保存が成功した後、カレンダーが開いていればキャッシュを更新
    function refreshCalendarIfOpen() {
      if (calendarBox.classList.contains('open')) {
        uploadedDatesCache = null;
        loadUploadedDates();
      }
    }

    saveBtn.addEventListener('click', handleSave);
    saveJikakuBtn.addEventListener('click', handleSaveJikaku);
    
    // 起動時に未送信分があれば裏で送信を試みる
    flushQueue();
    
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
